<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Agent QA{% endblock %}</title>
  <style>
    :root{--bg:#f8fafc;--surface:#fff;--line:#e2e8f0;--ink:#0f172a;--muted:#64748b;--indigo:#4f46e5;--pass-bg:#dcfce7;--pass:#166534;--fail-bg:#ffe4e6;--fail:#9f1239;--active-bg:#e0e7ff;--active:#3730a3}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.shell{max-width:1240px;margin:auto;padding:34px 24px}header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}.brand{font-weight:750;font-size:20px;letter-spacing:-.03em}.brand i{display:inline-block;width:10px;height:10px;background:#10b981;border-radius:50%;margin-right:9px}.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:0 1px 2px rgba(15,23,42,.025)}h1,h2,h3{letter-spacing:-.03em;margin:0}h1{font-size:28px}h2{font-size:17px}h3{font-size:14px}.muted{color:var(--muted)}.badge{font-weight:650;text-transform:capitalize;display:inline-flex;padding:4px 9px;border-radius:99px;font-size:12px}.passed{background:var(--pass-bg);color:var(--pass)}.failed,.error{background:var(--fail-bg);color:var(--fail)}.running,.queued{background:var(--active-bg);color:var(--active)}a{color:var(--indigo);text-decoration:none}button{background:var(--indigo);color:#fff;border:0;border-radius:8px;padding:10px 15px;font:inherit;font-weight:650;cursor:pointer}input,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font:inherit;color:var(--ink);background:white}textarea{resize:vertical;min-height:92px}label{display:block;font-weight:650;margin:0 0 6px}table{width:100%;border-collapse:collapse}th,td{padding:14px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}.grid{display:grid;gap:18px}.two{grid-template-columns:1.1fr .9fr}@media(max-width:800px){.two{grid-template-columns:1fr}.shell{padding:22px 14px}}code{font:12px ui-monospace,SFMono-Regular,Consolas,monospace;background:#f1f5f9;padding:2px 4px;border-radius:4px}.step-result{max-width:360px;color:var(--muted)}
  </style>
</head><body><main class="shell"><header><a class="brand" href="/"><i></i>Agent QA</a><span class="muted">Autonomous browser testing control center</span></header>{% block content %}{% endblock %}</main></body></html>
